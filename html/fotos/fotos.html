<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Universal Media Viewer v4</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      background: #0f172a;
      color: #e2e8f0;
    }
    header {
      background: #1e2937;
      padding: 25px;
      text-align: center;
    }
    button {
      padding: 14px 32px;
      font-size: 17px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
    #gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 15px;
      padding: 20px;
    }
    .media-item {
      background: #1e2937;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #334155;
    }
    .media-item img, .media-item video {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }
    .info {
      padding: 12px;
      font-size: 13.5px;
    }
    .path {
      font-size: 11px;
      color: #94a3b8;
      margin-top: 6px;
      word-break: break-all;
    }
    #status { padding: 20px; text-align: center; font-size: 15px; }
  </style>
</head>
<body>
  <header>
    <h1>📁 Universal Media Viewer v4</h1>
    <button onclick="document.getElementById('folderInput').click()">📂 Escolher Pasta</button>
    <p><small>HEIC pode não aparecer em todos os navegadores</small></p>
  </header>

  <input type="file" id="folderInput" webkitdirectory directory multiple style="display:none">
  <div id="status"></div>
  <div id="gallery"></div>

  <script>
    const gallery = document.getElementById('gallery');
    const statusEl = document.getElementById('status');

    document.getElementById('folderInput').addEventListener('change', async (e) => {
      const files = Array.from(e.target.files);
      gallery.innerHTML = '';
      
      statusEl.textContent = `Total de arquivos: ${files.length} | Processando...`;

      const allowed = ['jpg','jpeg','png','gif','webp','heic','heif','mp4','mov','m4v'];
      
      const mediaFiles = files.filter(file => {
        const ext = file.name.toLowerCase().split('.').pop();
        return allowed.includes(ext);
      });

      statusEl.textContent = `✅ ${mediaFiles.length} mídias encontradas`;

      mediaFiles.sort((a, b) => a.webkitRelativePath.localeCompare(b.webkitRelativePath));

      for (const file of mediaFiles) {
        const div = document.createElement('div');
        div.className = 'media-item';
        
        const ext = file.name.toLowerCase().split('.').pop();
        const isVideo = ['mp4','mov','m4v'].includes(ext);
        const url = URL.createObjectURL(file);

        let mediaHTML = '';

        if (isVideo) {
          mediaHTML = `<video src="${url}" controls muted></video>`;
        } else {
          mediaHTML = `<img src="${url}" alt="${file.name}" loading="lazy">`;
        }

        div.innerHTML = `
          ${mediaHTML}
          <div class="info">
            <strong>${file.name}</strong>
            <div class="path">${file.webkitRelativePath || file.name}</div>
          </div>
        `;
        gallery.appendChild(div);
      }
    });
  </script>
</body>
</html>
