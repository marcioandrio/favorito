<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Borboletas Voando - Realista</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #3b82f6 100%);
      height: 100vh;
      position: relative;
    }

    .butterfly {
      position: absolute;
      font-size: 42px;
      pointer-events: none;
      user-select: none;
      animation: fly 22s linear infinite, flap 0.45s infinite alternate ease-in-out;
      filter: drop-shadow(0 0 12px rgba(167, 139, 250, 0.9));
      z-index: 1;
    }

    @keyframes fly {
      0% { transform: translate(0, 0) rotate(0deg); }
      100% { transform: translate(var(--dx), var(--dy)) rotate(var(--rot)); }
    }

    @keyframes flap {
      from { transform: scale(1, 0.7); }
      to   { transform: scale(1, 1.2); }
    }

    .sparkle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: #e0e7ff;
      border-radius: 50%;
      box-shadow: 0 0 12px #c4d0ff, 0 0 20px #a5b4fc;
      pointer-events: none;
      animation: sparkleAnim 4s linear infinite;
    }

    @keyframes sparkleAnim {
      0% { opacity: 0; transform: scale(0.4); }
      40% { opacity: 0.95; }
      100% { opacity: 0; transform: scale(1.3); }
    }
  </style>
</head>
<body>

  <script>
    const butterflyEmojis = ['🦋', '🦋', '🦋', '🌸', '✨'];

    function randomColor() {
      const colors = ['#a5b4fc', '#c4d0ff', '#e0e7ff', '#ddd6fe', '#f3e8ff'];
      return colors[Math.floor(Math.random() * colors.length)];
    }

    function createButterfly() {
      const bf = document.createElement('div');
      bf.className = 'butterfly';
      bf.textContent = butterflyEmojis[Math.floor(Math.random() * butterflyEmojis.length)];
      
      const size = Math.random() * 28 + 34;
      bf.style.fontSize = `${size}px`;
      bf.style.color = randomColor();
      
      bf.style.left = `${Math.random() * 100}vw`;
      bf.style.top = `${Math.random() * 65}vh`;
      
      const duration = Math.random() * 26 + 19;
      bf.style.animationDuration = `${duration}s`;
      
      const dx = (Math.random() - 0.5) * 1600;
      const dy = (Math.random() - 0.5) * 900 - 80;
      const rot = (Math.random() - 0.5) * 260;
      
      bf.style.setProperty('--dx', `${dx}px`);
      bf.style.setProperty('--dy', `${dy}px`);
      bf.style.setProperty('--rot', `${rot}deg`);
      
      document.body.appendChild(bf);

      setTimeout(() => bf.remove(), duration * 1000 + 2000);
    }

    setInterval(createButterfly, 240);

    for (let i = 0; i < 18; i++) {
      setTimeout(createButterfly, i * 140);
    }

    function createSparkle() {
      const s = document.createElement('div');
      s.className = 'sparkle';
      s.style.left = `${Math.random() * 100}vw`;
      s.style.top = `${Math.random() * 100}vh`;
      s.style.animationDuration = `${Math.random() * 3 + 2.5}s`;
      document.body.appendChild(s);
      setTimeout(() => s.remove(), 6000);
    }

    setInterval(createSparkle, 65);
  </script>

</body>
</html>
