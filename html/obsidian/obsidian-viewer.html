<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MA Brain — Assistente</title>
<style>
  :root {
    --bg: #0d0f14; --surface: #161921; --surface2: #1e2330;
    --border: #2a3042; --text: #c9d1d9; --text2: #7d8590;
    --accent: #58a6ff; --green: #3fb950; --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  #topbar { background: var(--surface2); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  #topbar h1 { font-size: 13px; font-weight: bold; letter-spacing: 1.5px; text-transform: uppercase; color: var(--accent); white-space: nowrap; }
  #notes-count { font-size: 11px; color: var(--text2); margin-left: auto; }
  #btn-load { background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 6px 12px; font-size: 11px; cursor: pointer; white-space: nowrap; }
  #btn-load:hover { border-color: var(--accent); color: var(--accent); }
  #folder-input { display: none; }

  #layout { flex: 1; display: flex; overflow: hidden; }

  #sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; }
  #sidebar-title { padding: 10px 12px; font-size: 10px; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; color: var(--text2); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  #client-search { margin: 8px; padding: 6px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 12px; outline: none; }
  #client-search:focus { border-color: var(--accent); }
  #client-list { overflow-y: auto; flex: 1; }
  #client-list::-webkit-scrollbar { width: 4px; }
  #client-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .client-item { padding: 7px 12px; cursor: pointer; font-size: 12px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .client-item:hover { background: var(--surface2); color: var(--text); }
  .client-item.active { background: var(--surface2); color: var(--accent); }

  #chat-area { flex: 1; display: flex; flex-direction: column; }
  #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
  #messages::-webkit-scrollbar { width: 6px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg { display: flex; gap: 12px; }
  .msg.user { flex-direction: row-reverse; align-self: flex-end; max-width: 70%; }
  .msg.assistant { align-self: flex-start; max-width: 90%; }
  .msg-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; background: var(--surface2); }
  .msg.user .msg-avatar { background: var(--accent); }
  .msg-bubble { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 16px; line-height: 1.6; font-size: 13px; }
  .msg.user .msg-bubble { background: var(--surface2); border-color: var(--accent); }

  .note-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; margin-top: 10px; }
  .note-card-title { font-size: 11px; font-weight: bold; color: var(--accent); letter-spacing: 0.5px; margin-bottom: 8px; }
  .note-card-body { font-size: 12px; color: var(--text); line-height: 1.6; white-space: pre-wrap; max-height: 300px; overflow-y: auto; }
  .note-card-body::-webkit-scrollbar { width: 3px; }
  .note-card-body::-webkit-scrollbar-thumb { background: var(--border); }
  .note-card-path { font-size: 10px; color: var(--text2); margin-top: 6px; }

  .md-content h1 { color: var(--accent); font-size: 16px; margin: 8px 0 6px; }
  .md-content h2 { color: var(--text); font-size: 14px; margin: 8px 0 4px; }
  .md-content h3 { color: var(--text); font-size: 13px; margin: 6px 0 4px; }
  .md-content strong { color: #fff; }
  .md-content ul, .md-content ol { margin-left: 16px; margin-top: 4px; }
  .md-content li { margin-bottom: 3px; }
  .md-content hr { border: none; border-top: 1px solid var(--border); margin: 8px 0; }
  .md-content code { background: var(--bg); padding: 1px 5px; border-radius: 3px; font-size: 11px; color: var(--green); }

  #welcome { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; color: var(--text2); text-align: center; padding: 40px; }
  #welcome .icon { font-size: 52px; }
  #welcome h2 { color: var(--text); font-size: 20px; }
  #btn-load-big { background: var(--accent); color: #0d0f14; border: none; border-radius: 8px; padding: 14px 28px; font-size: 14px; font-weight: bold; cursor: pointer; margin-top: 8px; display: inline-block; }

  #input-area { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 10px; background: var(--surface); }
  #msg-input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text); font-size: 13px; font-family: inherit; resize: none; outline: none; min-height: 42px; max-height: 120px; }
  #msg-input:focus { border-color: var(--accent); }
  #btn-send { background: var(--accent); color: #0d0f14; border: none; border-radius: 8px; padding: 10px 18px; font-size: 13px; font-weight: bold; cursor: pointer; }
</style>
</head>
<body>

<div id="topbar">
  <h1>⚖️ MA Brain</h1>
  <label id="btn-load">📂 Pasta<input id="folder-input" type="file" webkitdirectory multiple></label>
  <span id="notes-count"></span>
</div>

<div id="layout">
  <div id="sidebar">
    <div id="sidebar-title">👤 Clientes</div>
    <input id="client-search" type="text" placeholder="Pesquisar cliente...">
    <div id="client-list"></div>
  </div>

  <div id="chat-area">
    <div id="welcome">
      <div class="icon">🧠</div>
      <h2>Assistente MA Brain</h2>
      <p>Pesquisa instantânea nas suas notas do Obsidian.<br>Selecione a pasta para começar.</p>
      <label class="btn-load-big" id="btn-load-big">📂 Selecionar Pasta MA Brain
        <input type="file" webkitdirectory multiple style="display:none" onchange="loadFolder(this.files)">
      </label>
    </div>
    <div id="messages" style="display:none"></div>
    <div id="input-area" style="display:none">
      <textarea id="msg-input" placeholder="Ex: situação do cliente Adriano, processos pendentes, reagrupamento familiar..." rows="1"></textarea>
      <button id="btn-send" onclick="sendMessage()">Pesquisar</button>
    </div>
  </div>
</div>

<script>
let notes = {};
let allFiles = [];

// ── LOAD ─────────────────────────────────────────────────────────────────────
document.getElementById('folder-input').addEventListener('change', e => loadFolder(e.target.files));

async function loadFolder(files) {
  notes = {}; allFiles = [];
  for (const file of Array.from(files)) {
    const parts = file.webkitRelativePath.split('/');
    const path = parts.slice(1).join('/');
    if (!path || !file.name.endsWith('.md') || path.split('/').some(p => p.startsWith('.'))) continue;
    notes[path] = await file.text();
    allFiles.push(path);
  }
  allFiles.sort();
  buildClientList('');
  document.getElementById('notes-count').textContent = allFiles.length + ' notas';
  document.getElementById('welcome').style.display = 'none';
  document.getElementById('messages').style.display = 'flex';
  document.getElementById('input-area').style.display = 'flex';
  addMsg('assistant', '✅ <strong>' + allFiles.length + ' notas carregadas.</strong><br><br>Escreva o nome de um cliente ou qualquer assunto para pesquisar nas notas.');
}

// ── SIDEBAR ───────────────────────────────────────────────────────────────────
document.getElementById('client-search').addEventListener('input', e => buildClientList(e.target.value));

function buildClientList(q) {
  const ql = q.toLowerCase();
  const seen = new Set();
  const clients = [];
  for (const p of allFiles) {
    if (!p.startsWith('01 - Clientes/')) continue;
    const name = p.split('/')[1];
    if (name && !seen.has(name) && (!ql || name.toLowerCase().includes(ql))) {
      seen.add(name); clients.push(name);
    }
  }
  const list = document.getElementById('client-list');
  list.innerHTML = '';
  for (const name of clients) {
    const el = document.createElement('div');
    el.className = 'client-item';
    el.textContent = name;
    el.onclick = () => {
      document.querySelectorAll('.client-item').forEach(e => e.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('msg-input').value = name;
      sendMessage();
    };
    list.appendChild(el);
  }
}

// ── SEARCH ────────────────────────────────────────────────────────────────────
const input = document.getElementById('msg-input');
input.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
input.addEventListener('input', () => { input.style.height = 'auto'; input.style.height = Math.min(input.scrollHeight, 120) + 'px'; });

function sendMessage() {
  const q = input.value.trim();
  if (!q) return;
  input.value = ''; input.style.height = 'auto';
  addMsg('user', q);
  const results = search(q);
  if (!results.length) {
    addMsg('assistant', '🔍 Nenhuma nota encontrada para <strong>"' + q + '"</strong>.');
    return;
  }
  showResults(q, results);
}

function search(q) {
  const words = q.toLowerCase().split(/\s+/).filter(w => w.length > 1);
  const scores = {};
  for (const path of allFiles) {
    const text = (notes[path] || '').toLowerCase();
    const pathL = path.toLowerCase();
    let score = 0;
    for (const w of words) {
      if (pathL.includes(w)) score += 10;
      score += (text.match(new RegExp(w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g')) || []).length;
    }
    if (score > 0) scores[path] = score;
  }
  return Object.entries(scores).sort((a, b) => b[1] - a[1]).slice(0, 6).map(([p]) => p);
}

function showResults(q, paths) {
  let html = '🔍 Encontrei <strong>' + paths.length + ' nota(s)</strong> para "<strong>' + q + '</strong>":<br>';
  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.innerHTML = '<div class="msg-avatar">⚖️</div><div class="msg-bubble" id="res-bubble">' + html + '</div>';
  document.getElementById('messages').appendChild(div);

  const bubble = div.querySelector('#res-bubble');
  for (const path of paths) {
    const text = notes[path] || '';
    const name = path.split('/').pop().replace('.md', '');
    const card = document.createElement('div');
    card.className = 'note-card';
    card.innerHTML = '<div class="note-card-title">📄 ' + name + '</div>'
      + '<div class="note-card-body md-content">' + renderMd(text) + '</div>'
      + '<div class="note-card-path">' + path + '</div>';
    bubble.appendChild(card);
  }
  div.scrollIntoView({ behavior: 'smooth' });
}

// ── MARKDOWN ──────────────────────────────────────────────────────────────────
function renderMd(text) {
  text = text.replace(/^---[\s\S]*?---\n?/, ''); // remove frontmatter
  text = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  text = text.replace(/^### (.+)/gm, '<h3>$1</h3>');
  text = text.replace(/^## (.+)/gm,  '<h2>$1</h2>');
  text = text.replace(/^# (.+)/gm,   '<h1>$1</h1>');
  text = text.replace(/^---$/gm, '<hr>');
  text = text.replace(/^\s*[-*] (.+)/gm, '<li>$1</li>');
  text = text.replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>');
  text = text.replace(/\[\[([^\]|]+)(?:\|([^\]]+))?\]\]/g, '<span style="color:var(--accent)">$2 $1</span>');
  text = text.replace(/\n{2,}/g, '<br><br>').replace(/\n/g, '<br>');
  return text;
}

function addMsg(role, html) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = '<div class="msg-avatar">' + (role === 'user' ? '👤' : '⚖️') + '</div><div class="msg-bubble">' + html + '</div>';
  document.getElementById('messages').appendChild(div);
  div.scrollIntoView({ behavior: 'smooth' });
}
</script>
</body>
</html>
