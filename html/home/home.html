<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>
  <link rel="icon" href="imagem/icone/ma.png">
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #151820;
      --surface2: #1c2030;
      --border: #252a3a;
      --accent: #c4a35a;
      --accent2: #8b6f3a;
      --text: #e8e4dc;
      --text2: #9a9585;
      --red: #c0392b;
      --green: #27ae60;
      --yellow: #f39c12;
      --radius: 10px;
      --header-h: 38px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Georgia', serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    /* ── TOP BAR ── */
    #topbar {
      height: 36px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      flex-shrink: 0;
    }
    #topbar .logo {
      font-size: 13px;
      font-weight: bold;
      color: var(--accent);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    #topbar .date-display {
      font-size: 11px;
      color: var(--text2);
      margin-left: auto;
    }
    #topbar .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
    }

    /* ── GRID WRAPPER ── */
    #grid-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
      overflow-y: auto;
      overflow-x: hidden;
    }
    /* ── GRID ── */
    #grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr 160px;
      gap: 16px;
      width: 99%;
      min-height: 99%;
      height: 99%;
      max-width: 1400px;
    }

    /* ── TABLET (iPad) ── */
    @media (max-width: 900px) {
      #grid {
        grid-template-columns: 1fr;
        grid-template-rows: auto;
        height: auto;
        min-height: unset;
      }
      #grid .panel { min-height: 320px; }
      #calendario-panel { grid-column: 1; min-height: 200px; }
      #grid-wrapper { align-items: flex-start; }
    }

    /* ── MOBILE (iPhone) ── */
    @media (max-width: 500px) {
      #grid { gap: 10px; }
      #grid .panel { min-height: 280px; }
      #calendario-panel { min-height: 180px; }
      .panel-header { padding: 0 10px; }
    }

    /* ── PANEL ── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .panel-header {
      height: var(--header-h);
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 8px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .panel-header .icon { font-size: 14px; }
    .panel-header .title {
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--accent);
    }
    .panel-body {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    /* ── IFRAME panels ── */
    .panel-body iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: var(--surface);
      filter: brightness(0.95);
    }
    .no-content {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text2);
      font-size: 13px;
      flex-direction: column;
      gap: 8px;
    }
    .no-content .nc-icon { font-size: 32px; opacity: 0.3; }

    /* ── TAREFAS ── */
    #tarefas-panel .panel-body {
      display: flex;
      flex-direction: column;
    }
    #tarefas-toolbar {
      padding: 8px 10px;
      display: flex;
      gap: 6px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .btn {
      padding: 5px 12px;
      border: none;
      border-radius: 5px;
      font-size: 11px;
      font-family: inherit;
      cursor: pointer;
      font-weight: bold;
      letter-spacing: 0.5px;
      transition: opacity .15s;
    }
    .btn:hover { opacity: 0.8; }
    .btn-nova { background: var(--accent); color: #0d0f14; }
    .btn-concluir { background: var(--green); color: #fff; }

    #tarefas-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
    }
    #tarefas-list::-webkit-scrollbar { width: 4px; }
    #tarefas-list::-webkit-scrollbar-track { background: transparent; }
    #tarefas-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .tarefa-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 12px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background .12s, border-color .12s;
      font-size: 12px;
    }
    .tarefa-item:hover { background: var(--surface2); }
    .tarefa-item.selected {
      background: rgba(196,163,90,.1);
      border-left-color: var(--accent);
    }
    .tarefa-item .tarefa-texto {
      flex: 1;
      color: var(--text);
      line-height: 1.4;
    }
    .tarefa-item .prioridade { font-size: 14px; flex-shrink: 0; }
    .tarefa-item .btn-editar {
      display: none;
      background: none;
      border: 1px solid var(--border);
      color: var(--text2);
      border-radius: 4px;
      padding: 2px 7px;
      font-size: 10px;
      cursor: pointer;
      font-family: inherit;
      flex-shrink: 0;
    }
    .tarefa-item:hover .btn-editar { display: block; }
    .tarefa-item .btn-editar:hover { border-color: var(--accent); color: var(--accent); }

    /* ── FILMES ── */
    #filmes-panel .panel-body {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }
    /* vista carrossel */
    #filmes-carrossel {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .fc-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(196,163,90,.15);
      border: 1px solid var(--accent2);
      color: var(--accent);
      width: 36px;
      height: 60px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5;
      transition: background .15s;
      flex-shrink: 0;
    }
    .fc-btn:hover { background: rgba(196,163,90,.35); }
    #fc-prev { left: 8px; }
    #fc-next { right: 8px; }
    #fc-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      padding: 16px 60px;
      transition: transform .1s;
    }
    #fc-card:hover { transform: scale(1.03); }
    #fc-emoji { font-size: 52px; line-height: 1; }
    #fc-titulo {
      font-size: 15px;
      font-weight: bold;
      color: var(--accent);
      text-align: center;
      max-width: 200px;
      line-height: 1.3;
    }
    #fc-hint {
      font-size: 10px;
      color: var(--text2);
      letter-spacing: 0.5px;
    }
    #fc-dots {
      display: flex;
      justify-content: center;
      gap: 6px;
      padding: 8px;
      flex-shrink: 0;
    }
    .fc-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--border);
      cursor: pointer;
      transition: background .15s, transform .15s;
    }
    .fc-dot.active { background: var(--accent); transform: scale(1.3); }
    /* vista player */
    #filmes-player {
      display: none;
      flex: 1;
      flex-direction: column;
      overflow: hidden;
    }
    #filmes-player-topbar {
      padding: 5px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--surface2);
    }
    #btn-voltar-filmes {
      background: none;
      border: 1px solid var(--border);
      color: var(--text2);
      border-radius: 4px;
      padding: 3px 9px;
      font-size: 11px;
      cursor: pointer;
      font-family: inherit;
    }
    #btn-voltar-filmes:hover { border-color: var(--accent); color: var(--accent); }
    #filmes-player-titulo { font-size: 11px; color: var(--text2); }
    #filmes-iframe {
      flex: 1;
      width: 100%;
      border: none;
      background: #000;
    }

    /* ── MODAL NOVA TAREFA ── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #modal-overlay.show { display: flex; }
    #modal-concluidas, #modal-confirmar, #modal-editar {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #modal-confirmar.show, #modal-editar.show, #modal-concluidas.show { display: flex; }
    #modal {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      width: 340px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    #modal h3 {
      font-size: 13px;
      color: var(--accent);
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    #modal input, #modal select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      padding: 8px 10px;
      width: 100%;
      outline: none;
    }
    #modal input:focus, #modal select:focus {
      border-color: var(--accent);
    }
    #modal .modal-btns {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }
    .btn-cancel {
      background: var(--border);
      color: var(--text2);
    }
  </style>
</head>
<body>

    margin-left: auto;

<div id="grid-wrapper"><div id="grid">

  <!-- CALENDÁRIO -->

<!-- MODAL CONFIRMAÇÃO CONCLUIR -->

  <div id="modal">

<script>
// ── DATA ──────────────────────────────────────────────────────────────
const hoje = new Date();
const ano = hoje.getFullYear();
const mes = String(hoje.getMonth() + 1).padStart(2, '0');
const dia = String(hoje.getDate()).padStart(2, '0');
const dataStr = `${ano}.${mes}.${dia}`;
const dataLabel = hoje.toLocaleDateString('pt-PT', {weekday:'long', day:'numeric', month:'long', year:'numeric'});

document.getElementById('date-display').textContent = dataLabel;


// ── NOTÍCIAS ──────────────────────────────────────────────────────────
async function carregarNoticias() {
  const body = document.getElementById('noticias-body');
  document.getElementById('noticias-data').textContent = dataStr;
  try {
    const r = await fetch(JB_URL_NEWS + '/latest', { headers: JB_HDR });
    const data = await r.json();
    const n = data.record;
    if (!n || !n.itens || !n.itens.length) {
      mostrarSemConteudo(body, '📰', 'Sem notícias para hoje');
      return;
    }
    body.innerHTML = `<div style="padding:14px;overflow-y:auto;height:100%;font-family:Georgia,serif;font-size:13px;color:var(--text);line-height:1.7;">
      <div style="font-size:11px;color:var(--text2);margin-bottom:12px;text-transform:uppercase;letter-spacing:1px;">${n.data || dataStr}</div>
      ${n.itens.map(item => `
        <div style="margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border);">
          <div style="font-weight:bold;color:var(--accent);margin-bottom:4px;">
            ${item.url
              ? `<a href="${item.url}" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:none;" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">${item.titulo}</a>`
              : item.titulo}
          </div>
          <div style="color:var(--text);font-size:12px;">${item.texto}</div>
          ${item.fonte ? `<div style="font-size:10px;color:var(--text2);margin-top:4px;">— ${item.fonte}</div>` : ''}
        </div>`).join('')}
    </div>`;
  } catch {
    mostrarSemConteudo(body, '📰', 'Erro ao carregar notícias');
  }
}

// ── EMAIL ─────────────────────────────────────────────────────────────
async function carregarEmail() {
  const body = document.getElementById('email-body');
  document.getElementById('email-data').textContent = dataStr;
  try {
    const r = await fetch(JB_URL_EMAIL + '/latest', { headers: JB_HDR });
    const data = await r.json();
    const e = data.record;
    if (!e || !e.itens || !e.itens.length) {
      mostrarSemConteudo(body, '📬', 'Sem emails importantes hoje');
      return;
    }
    body.innerHTML = `<div style="padding:14px;overflow-y:auto;height:100%;font-family:Georgia,serif;font-size:13px;color:var(--text);line-height:1.7;">
      <div style="font-size:11px;color:var(--text2);margin-bottom:12px;text-transform:uppercase;letter-spacing:1px;">${e.data || dataStr}</div>
      ${e.itens.map(item => `
        <div style="margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border);">
          <div style="font-weight:bold;color:var(--accent);margin-bottom:2px;">${item.de || ''} ${item.assunto ? `— <span style="color:var(--text)">${item.assunto}</span>` : ''}</div>
          <div style="color:var(--text);font-size:12px;">${item.resumo}</div>
        </div>`).join('')}
    </div>`;
  } catch {
    mostrarSemConteudo(body, '📬', 'Erro ao carregar emails');
  }
}

function mostrarSemConteudo(container, icon, msg) {
  container.innerHTML = `<div class="no-content"><div class="nc-icon">${icon}</div><span>${msg}</span></div>`;
}

// ── SOM ───────────────────────────────────────────────────────────────
const _som = new Audio('sound/luna.tarefa.concluida.mp3');
function tocarSom() { _som.currentTime = 0; _som.play().catch(() => {}); }

// ── JSONBin.io — bins separados por painel ────────────────────────────

let tarefas = [];
let selecionada = null;

async function carregarTarefas() {
  try {
    const r = await fetch(JB_URL + '/latest', { headers: JB_HDR });
    const data = await r.json();
    tarefas = data.record.tarefas || [];
    renderTarefas();
  } catch {
    document.getElementById('tarefas-list').innerHTML =
      '<div class="no-content"><div class="nc-icon">⚠️</div><span>Erro ao carregar tarefas</span></div>';
  }
}

async function salvarTarefas() {
  const r = await fetch(JB_URL + '/latest', { headers: JB_HDR });
  const data = await r.json();
  const rec = data.record;
  await fetch(JB_URL, {
    method: 'PUT',
    headers: JB_HDR,
    body: JSON.stringify({ ...rec, tarefas })
  });
}

function renderTarefas() {
  const list = document.getElementById('tarefas-list');
  document.getElementById('tarefas-count').textContent = `${tarefas.length} pendente${tarefas.length !== 1 ? 's' : ''}`;

  if (!tarefas.length) {
    list.innerHTML = '<div class="no-content" style="margin-top:40px"><div class="nc-icon">✅</div><span>Nenhuma tarefa pendente</span></div>';
    selecionada = null;
    return;
  }

  list.innerHTML = tarefas.map((t, i) => {
    const partes = t.split('|');
    const texto = partes[0].trim();
    const prio = partes[1] ? partes[1].trim() : '🟡 Média';
    const emoji = prio.split(' ')[0] || '🟡';
    const sel = selecionada === i ? 'selected' : '';
    return `<div class="tarefa-item ${sel}" onclick="selecionarTarefa(${i})">
      <span class="prioridade">${emoji}</span>
      <span class="tarefa-texto">${texto}</span>
      <button class="btn-editar" onclick="abrirEditar(event,${i})">✏️ Editar</button>
    </div>`;
  }).join('');
}

function selecionarTarefa(i) {
  selecionada = selecionada === i ? null : i;
  renderTarefas();
}

// ── CONFIRMAR CONCLUSÃO ───────────────────────────────────────────────
function concluirSelecionada() {
  if (selecionada === null) { alert('Selecione uma tarefa primeiro.'); return; }
  const texto = tarefas[selecionada].split('|')[0].trim();
  document.getElementById('modal-confirmar-texto').textContent = `"${texto}"`;
  document.getElementById('modal-confirmar').classList.add('show');
}

function fecharConfirmar() {
  document.getElementById('modal-confirmar').classList.remove('show');
}

async function confirmarConclusao() {
  fecharConfirmar();
  const hoje = new Date();
  const d = `${hoje.getFullYear()}.${String(hoje.getMonth()+1).padStart(2,'0')}.${String(hoje.getDate()).padStart(2,'0')}`;
  const texto = tarefas[selecionada].split('|')[0].trim();
  tarefas.splice(selecionada, 1);
  selecionada = null;
  renderTarefas();
  const r = await fetch(JB_URL + '/latest', { headers: JB_HDR });
  const rec = (await r.json()).record;
  const concluidas = rec.concluidas || [];
  concluidas.push(`${d}. ${texto}`);
  await fetch(JB_URL, {
    method: 'PUT',
    headers: JB_HDR,
    body: JSON.stringify({ ...rec, tarefas, concluidas })
  });
  tocarSom();
}

let editarIdx = null;

function abrirEditar(event, i) {

  editarIdx = i;
  const partes = tarefas[i].split('|');
  document.getElementById('modal-editar-texto').value = partes[0].trim();
  document.getElementById('modal-editar-prioridade').value = partes[1] ? partes[1].trim() : '🟡 Média';
  document.getElementById('modal-editar').classList.add('show');
  setTimeout(() => document.getElementById('modal-editar-texto').focus(), 50);
}

function fecharEditar() {
  document.getElementById('modal-editar').classList.remove('show');
  editarIdx = null;
}

async function salvarEdicao() {
  const texto = document.getElementById('modal-editar-texto').value.trim();

  tarefas[editarIdx] = `${texto} | ${prioridade}`;

}

async function abrirConcluidas() {

const ICAL_URLS = [
  { url: 'https://p186-caldav.icloud.com/published/2/ODA2NDI3OTg4NzgwNjQyN1KKS7_g3jbSK5veu0v_cWCDLHISOz43w1EuQ0pp-Opa',                                                                             cor: '#e74c3c', nome: 'Brasil'  },
  { url: 'https://p186-caldav.icloud.com/published/2/ODA2NDI3OTg4NzgwNjQyN1KKS7_g3jbSK5veu0v_cWB2Rbfb4PnMQsKI3-EUPFHVJkm1JYSYTu5Y_ikqfhaq6y0nAPHqH8yZUlFOH2XwRC8', cor: '#e67e22', nome: 'Europa'  },
  { url: 'https://p29-caldav.icloud.com/published/2/ODA2NDI3OTg4NzgwNjQyN1KKS7_g3jbSK5veu0v_cWCivdkaRgqILcQO0HoxojhQ',                                                                              cor: '#2980b9', nome: 'Pessoal' },
];
const CORS  = 'https://corsproxy.io/?url=';

function parseDateICS(str) {
  if (!str) return null;
  const s = str.replace(/[TZ]/g, '').replace(/[^0-9]/g, '');
  if (s.length < 8) return null;
  const y = s.slice(0,4), m = s.slice(4,6), d = s.slice(6,8);
  const h = s.slice(8,10)||'00', mi = s.slice(10,12)||'00';
  return new Date(`${y}-${m}-${d}T${h}:${mi}:00`);
}

function formatHora(date) {
  if (!date) return '';
  return date.toLocaleTimeString('pt-PT', {hour:'2-digit', minute:'2-digit'});
}

async function carregarCalendario() {
  const body = document.getElementById('calendario-body');
  document.getElementById('calendario-data').textContent = dataStr;
  body.innerHTML = '<span style="color:var(--text2);font-size:12px;padding:8px;">A carregar calendário...</span>';

  try {
    const respostas = await Promise.allSettled(
      ICAL_URLS.map(c => fetch(CORS + encodeURIComponent(c.url)).then(r => r.text()).then(txt => ({ txt, cor: c.cor, nome: c.nome })))
    );

    const eventos = [];
    for (const res of respostas) {
      if (res.status !== 'fulfilled') continue;
      const { txt, cor, nome } = res.value;
      const blocos = txt.split('BEGIN:VEVENT');
      blocos.shift();
      for (const bloco of blocos) {
        const get = (key) => {
          const m = bloco.match(new RegExp(key + '[^:]*:([^\\r\\n]+)'));
          return m ? m[1].trim() : '';
        };
        const summary  = get('SUMMARY');
        const dtstart  = get('DTSTART');
        const dtend    = get('DTEND');
        const location = get('LOCATION');
        const start = parseDateICS(dtstart);
        const end   = parseDateICS(dtend);
        if (!start) continue;

        const hojeStr = `${ano}${mes}${dia}`;
        const dStr = dtstart.replace(/[^0-9]/g,'').slice(0,8);
        if (dStr !== hojeStr) continue;

        const isDiaInteiro = !dtstart.includes('T');
        eventos.push({ summary, start, end, location, isDiaInteiro, cor, nome });
      }
    }

    eventos.sort((a,b) => a.start - b.start);

    if (!eventos.length) {
      body.innerHTML = '<div class="no-content"><div class="nc-icon">📅</div><span>Sem eventos para hoje</span></div>';
      return;
    }

    body.innerHTML = eventos.map(ev => {
      const hora = ev.isDiaInteiro ? 'Dia todo' : `${formatHora(ev.start)}${ev.end ? ' – ' + formatHora(ev.end) : ''}`;
      const loc  = ev.location ? `<div style="font-size:10px;color:var(--text2);margin-top:3px;">📍 ${ev.location}</div>` : '';
      return `<div style="
        background:var(--surface2);
        border:1px solid var(--border);
        border-left:4px solid ${ev.cor};
        border-radius:6px;
        padding:8px 12px;
        min-width:160px;
        max-width:220px;
        flex-shrink:0;
        display:flex;
        flex-direction:column;
        gap:2px;
      ">
        <div style="font-size:9px;color:${ev.cor};font-weight:bold;letter-spacing:0.5px;text-transform:uppercase;">${ev.nome}</div>
        <div style="font-size:10px;color:var(--text2);">${hora}</div>
        <div style="font-size:12px;color:var(--text);line-height:1.4;">${ev.summary}</div>
        ${loc}
      </div>`;
    }).join('');

  } catch(e) {
    body.innerHTML = '<div class="no-content"><div class="nc-icon">⚠️</div><span>Erro ao carregar calendário</span></div>';
  }
}

// ── CLEMENTINE AUDIO SCHEDULER ────────────────────────────────
(function() {
  const MP3 = 'clementine/mp3/';

  function getSlot(now) {
    const day = now.getDay(); // 0=Dom 1-5=Seg-Sex 6=Sab
    const h   = now.getHours();
    if (day === 6) return null; // Sábado — silêncio
    if (day === 0) return (h >= 14 && h < 22) ? MP3 + 'luna.bom.dia.mp3' : null;
    // Seg–Sex
    if      (h >= 8  && h < 11) return MP3 + 'luna.bom.dia.mp3';
    else if (h >= 11 && h < 12) return MP3 + 'luna.whatasapp.mp3';
    else if (h >= 12 && h < 14) return MP3 + 'luana.hora.almoco.mp3';
    else if (h >= 14 && h < 22) return MP3 + 'luna.whatasapp.mp3';
    else                         return MP3 + 'luna.boa.noite.mp3';
  }

  function slotKey(now) {
    const h = now.getHours();
    const band = h < 8 ? 0 : h < 11 ? 8 : h < 12 ? 11 : h < 14 ? 12 : h < 22 ? 14 : 22;
    return `${now.getDay()}:${band}`;
  }

  const POINT_TRIGGERS = [
    { key: 'cafe',   days: [0,1,2,3,4,5,6], h: 16, audio: MP3 + 'luna.cafe.mp3'      },
    { key: 'mkt-15', days: [3, 5],           h: 15, audio: MP3 + 'luna.marketing.mp3' },
    { key: 'mkt-18', days: [3, 5],           h: 18, audio: MP3 + 'luna.marketing.mp3' },
  ];
  const firedAt = new Map();

  function setSpeaking(on) {
    const ring = document.getElementById('clem-ring');
    if (!ring) return;
    ring.style.boxShadow = on
      ? '0 0 0 3px #c9a85c, 0 0 28px rgba(196,163,90,0.9), 0 0 0 6px rgba(196,163,90,0.3)'
      : '0 0 0 2px var(--accent), 0 0 16px rgba(196,163,90,0.4)';
  }

  function playFile(src) {
    if (!src) return;
    const a = new Audio(src);
    a.volume = 0.85;
    setSpeaking(true);
    a.addEventListener('ended', () => setSpeaking(false));
    a.addEventListener('error', () => setSpeaking(false));
    a.addEventListener('pause', () => setSpeaking(false));
    a.play().catch(() => setSpeaking(false));
  }

  function checkPointTriggers(now) {
    const day     = now.getDay();
    const h       = now.getHours();
    const m       = now.getMinutes();
    const dateStr = now.toDateString();
    POINT_TRIGGERS.forEach(pt => {
      if (!pt.days.includes(day) || h !== pt.h || m !== 0) return;
      const fk = `${pt.key}-${dateStr}`;
      if (firedAt.has(fk)) return;
      firedAt.set(fk, true);
      playFile(pt.audio);
    });
  }

  // Toca saudação inicial ao abrir a página
  playFile(getSlot(new Date()));

  // Verifica mudança de slot e triggers a cada 30 s
  let lastSlot = slotKey(new Date());
  setInterval(() => {
    const now = new Date();
    checkPointTriggers(now);
    const key = slotKey(now);
    if (key !== lastSlot) {
      lastSlot = key;
      playFile(getSlot(now));
    }
  }, 30_000);
})();
